# SwiftLint config for Bend Fly Shop

# Lint only these paths (adjust if you add more targets)
included:
  - SkeenaSystem

# Exclude build products
excluded:
  - .build
  - DerivedData

# Analyzer-only rules (require `swiftlint analyze`)
analyzer_rules:
  - unused_import

disabled_rules:
  - trailing_whitespace
  - todo
  - orphaned_doc_comment
  - multiple_closures_with_trailing_closure  # Common in SwiftUI
  - for_where                                 # Style preference
  - inclusive_language                        # Technical term in context

opt_in_rules:
  - empty_count
  - force_unwrapping
  - closure_end_indentation
  - collection_alignment
  - operator_usage_whitespace
  - unowned_variable_capture
  - yoda_condition
  # (note: unused_import moved to analyzer_rules)

# ─────────────────────────────────────────────────────────────
# Relaxed thresholds to allow CI to pass while gradually improving
# TODO: Tighten these over time as code quality improves
# ─────────────────────────────────────────────────────────────

line_length:
  warning: 200
  error: 500  # Bumped to accommodate existing long lines
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 200
  error: 400

file_length:
  warning: 800
  error: 1600

cyclomatic_complexity:
  warning: 15
  error: 30
  ignores_case_statements: true

force_unwrapping:
  severity: warning

force_try:
  severity: warning

# Allow common short variable names used in Swift
identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z
  allowed_symbols:
    - _

# Relax nesting for SwiftUI views with nested types
nesting:
  type_level:
    warning: 3
    error: 5

# Relax for CoreData factory methods and complex data structures
large_tuple:
  warning: 5
  error: 8

function_parameter_count:
  warning: 15
  error: 30
